<!DOCTYPE html>
<html lang="es-MX">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
<title>La cocina de Daira</title>
<meta name="description" content="Plan de alimentación semanal mexicano con macros exactos y lista de super. Funciona sin conexión." />
<meta name="robots" content="noindex, nofollow" />
<meta name="theme-color" content="#bd5a35" />
<meta name="apple-mobile-web-app-capable" content="yes" />
<meta name="mobile-web-app-capable" content="yes" />
<meta name="apple-mobile-web-app-status-bar-style" content="default" />
<meta name="apple-mobile-web-app-title" content="Daira" />
<link rel="manifest" href="manifest.webmanifest" />
<link rel="icon" type="image/png" sizes="32x32" href="icons/favicon-32.png" />
<link rel="apple-touch-icon" href="icons/apple-touch-icon.png" />
<!-- Tipografía Newsreader auto-hospedada en /fonts (funciona 100% sin conexión) -->
<link rel="preload" as="font" type="font/woff2" href="fonts/newsreader-latin.woff2" crossorigin />
<style>
@font-face{font-family:'Newsreader';font-style:normal;font-weight:500 700;font-display:swap;
  src:url(fonts/newsreader-latin.woff2) format('woff2');
  unicode-range:U+0000-00FF,U+0131,U+0152-0153,U+02BB-02BC,U+02C6,U+02DA,U+02DC,U+0304,U+0308,U+0329,U+2000-206F,U+20AC,U+2122,U+2191,U+2193,U+2212,U+2215,U+FEFF,U+FFFD;}
@font-face{font-family:'Newsreader';font-style:normal;font-weight:500 700;font-display:swap;
  src:url(fonts/newsreader-latinext.woff2) format('woff2');
  unicode-range:U+0100-02BA,U+02BD-02C5,U+02C7-02CC,U+02CE-02D7,U+02DD-02FF,U+0304,U+0308,U+0329,U+1D00-1DBF,U+1E00-1E9F,U+1EF2-1EFF,U+2020,U+20A0-20AB,U+20AD-20C0,U+2113,U+2C60-2C7F,U+A720-A7FF;}
@font-face{font-family:'Newsreader';font-style:normal;font-weight:500 700;font-display:swap;
  src:url(fonts/newsreader-viet.woff2) format('woff2');
  unicode-range:U+0102-0103,U+0110-0111,U+0128-0129,U+0168-0169,U+01A0-01A1,U+01AF-01B0,U+0300-0301,U+0303-0304,U+0308-0309,U+0323,U+0329,U+1EA0-1EF9,U+20AB;}
:root{
  --bg:oklch(0.994 0.004 70);
  --surface:oklch(1 0 0);
  --surface-2:oklch(0.975 0.008 70);
  --ink:oklch(0.24 0.02 45);
  --ink-soft:oklch(0.44 0.02 45);
  --ink-faint:oklch(0.52 0.015 45);
  --line:oklch(0.90 0.01 60);
  --line-soft:oklch(0.945 0.008 60);
  --primary:oklch(0.56 0.16 38);
  --primary-press:oklch(0.50 0.16 38);
  --primary-ink:oklch(0.42 0.12 38);
  --primary-tint:oklch(0.955 0.028 45);
  --green:oklch(0.62 0.14 150);
  --green-ink:oklch(0.46 0.12 150);
  --green-tint:oklch(0.955 0.04 150);
  --amber:oklch(0.78 0.13 75);
  --amber-ink:oklch(0.52 0.11 70);
  --gold:oklch(0.72 0.10 95);
  --gold-ink:oklch(0.50 0.08 92);
  --leaf:oklch(0.70 0.10 140);
  --leaf-ink:oklch(0.47 0.09 145);
  --water:oklch(0.70 0.12 230);
  --water-tint:oklch(0.95 0.03 230);
  --shadow-sm:0 1px 2px oklch(0.4 0.03 45 / .06), 0 1px 3px oklch(0.4 0.03 45 / .05);
  --shadow-md:0 2px 6px oklch(0.4 0.03 45 / .07), 0 8px 24px oklch(0.4 0.03 45 / .06);
  --r-sm:10px; --r-md:16px; --r-lg:22px; --r-pill:999px;
  --ff-display:"Newsreader", Georgia, "Times New Roman", serif;
  --ff-ui:system-ui, -apple-system, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
  --maxw:600px;
  --z-sticky:10; --z-nav:20; --z-toast:40;
  --tab-h:64px;
}
*{box-sizing:border-box;margin:0;padding:0}
html{-webkit-text-size-adjust:100%}
body{
  font-family:var(--ff-ui);
  background:var(--bg);
  color:var(--ink);
  font-size:15px;
  line-height:1.5;
  -webkit-font-smoothing:antialiased;
  text-rendering:optimizeLegibility;
  padding-bottom:calc(var(--tab-h) + env(safe-area-inset-bottom));
  overflow-x:hidden;
}
h1,h2,h3{font-family:var(--ff-display);font-weight:600;line-height:1.15;letter-spacing:-0.01em;text-wrap:balance}
button{font-family:inherit;color:inherit;cursor:pointer;border:none;background:none}
:focus-visible{outline:2.5px solid var(--primary);outline-offset:2px;border-radius:6px}
.tnum{font-variant-numeric:tabular-nums}

/* ---------- App header ---------- */
.appbar{
  position:sticky;top:0;z-index:var(--z-sticky);
  background:color-mix(in oklch, var(--bg) 86%, transparent);
  backdrop-filter:saturate(1.4) blur(10px);
  -webkit-backdrop-filter:saturate(1.4) blur(10px);
  border-bottom:1px solid var(--line-soft);
  padding:calc(env(safe-area-inset-top) + 12px) 18px 12px;
}
.appbar__row{max-width:var(--maxw);margin:0 auto;display:flex;align-items:center;gap:11px}
.brand-badge{width:34px;height:34px;border-radius:10px;flex:0 0 auto;box-shadow:var(--shadow-sm)}
.appbar h1{font-size:1.2rem;font-weight:700;color:var(--primary-ink)}
.appbar .sub{font-size:.72rem;color:var(--ink-faint);font-family:var(--ff-ui);letter-spacing:.01em;margin-top:1px}

main{max-width:var(--maxw);margin:0 auto;padding:0 14px}
.view{display:none;animation:fadein .28s var(--ease,ease) both}
.view.is-active{display:block}
@keyframes fadein{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:none}}

/* ---------- Day rail ---------- */
.dayrail-wrap{position:sticky;top:calc(env(safe-area-inset-top) + 59px);z-index:var(--z-sticky);
  background:var(--bg);padding:10px 0 8px;margin:0 -14px;}
.dayrail{display:flex;gap:7px;overflow-x:auto;scrollbar-width:none;padding:2px 14px 4px;scroll-snap-type:x proximity}
.dayrail::-webkit-scrollbar{display:none}
.day{flex:0 0 auto;scroll-snap-align:center;min-width:48px;padding:8px 6px 7px;border-radius:var(--r-md);
  background:var(--surface);border:1px solid var(--line);text-align:center;transition:transform .15s,background .15s,border-color .15s;}
.day:active{transform:scale(.95)}
.day .dn{font-size:.66rem;font-weight:600;letter-spacing:.06em;color:var(--ink-faint);text-transform:uppercase}
.day .di{font-family:var(--ff-display);font-weight:600;font-size:1.18rem;margin-top:2px}
.day.is-on{background:var(--primary);border-color:var(--primary)}
.day.is-on .dn,.day.is-on .di{color:#fff}
.day.is-today::after{content:"";display:block;width:5px;height:5px;border-radius:50%;background:var(--primary);margin:3px auto 0}
.day.is-on.is-today::after{background:#fff}

/* ---------- Day summary ---------- */
.summary{background:var(--surface);border:1px solid var(--line);border-radius:var(--r-lg);
  box-shadow:var(--shadow-sm);padding:16px 16px 14px;margin:6px 0 16px}
.summary__top{display:flex;align-items:baseline;justify-content:space-between;gap:10px;margin-bottom:13px}
.kcal-big{font-family:var(--ff-display);font-weight:700;font-size:2.15rem;line-height:1;color:var(--ink)}
.kcal-big small{font-size:.85rem;font-weight:600;color:var(--ink-faint);font-family:var(--ff-ui)}
.kcal-meta{text-align:right;font-size:.74rem;color:var(--ink-faint);line-height:1.35}
.kcal-meta b{color:var(--green-ink);font-weight:700}
.bars{display:grid;gap:9px}
.bar{display:grid;grid-template-columns:64px 1fr auto;align-items:center;gap:10px}
.bar__lab{font-size:.78rem;font-weight:600;color:var(--ink-soft)}
.bar__track{display:block;height:8px;border-radius:var(--r-pill);background:var(--surface-2);overflow:hidden;border:1px solid var(--line-soft)}
.bar__fill{display:block;height:100%;border-radius:var(--r-pill);width:100%;transform:scaleX(0);transform-origin:left center;transition:transform .6s cubic-bezier(.22,1,.36,1)}
.bar__val{font-size:.74rem;color:var(--ink-faint);min-width:62px;text-align:right}
.bar__val b{color:var(--ink);font-weight:600}
.b-p .bar__fill{background:var(--green)} .b-c .bar__fill{background:var(--amber)}
.b-f .bar__fill{background:var(--gold)} .b-fib .bar__fill{background:var(--leaf)}

/* hydration + steps */
.habits{display:flex;flex-wrap:wrap;gap:8px;align-items:center;margin-top:14px;padding-top:13px;border-top:1px dashed var(--line)}
.water{display:flex;align-items:center;gap:7px;flex-wrap:wrap}
.water__label{font-size:.74rem;color:var(--ink-soft);font-weight:600;display:flex;align-items:center;gap:5px}
.drops{display:flex;gap:5px}
.drop{width:28px;height:28px;border-radius:9px;display:grid;place-items:center;background:var(--surface-2);border:1px solid var(--line);transition:transform .14s,background .2s}
.drop svg{width:15px;height:15px;fill:var(--line);transition:fill .2s}
.drop.on{background:var(--water-tint);border-color:color-mix(in oklch,var(--water) 40%,var(--line))}
.drop.on svg{fill:var(--water)}
.drop:active{transform:scale(.86)}
.steps-chip{margin-left:auto;font-size:.72rem;color:var(--ink-faint);background:var(--surface-2);border:1px solid var(--line-soft);
  padding:5px 10px;border-radius:var(--r-pill);font-weight:500}

/* ---------- Meal cards ---------- */
.meals{display:grid;gap:13px}
.meal{background:var(--surface);border:1px solid var(--line);border-radius:var(--r-lg);box-shadow:var(--shadow-sm);
  overflow:hidden;animation:meal-in .42s cubic-bezier(.22,1,.36,1) both;animation-delay:calc(var(--i,0)*60ms)}
@keyframes meal-in{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:none}}
.meal__head{display:flex;align-items:center;justify-content:space-between;gap:10px;padding:13px 16px 0}
.meal__slot{display:inline-flex;align-items:center;gap:6px;font-size:.7rem;font-weight:700;letter-spacing:.07em;
  text-transform:uppercase;color:var(--primary-ink);background:var(--primary-tint);padding:4px 10px;border-radius:var(--r-pill)}
.meal__kcal{font-size:.78rem;font-weight:700;color:var(--ink);font-variant-numeric:tabular-nums}
.meal__kcal span{color:var(--ink-faint);font-weight:500}
.meal__title{font-size:1.18rem;font-weight:600;padding:8px 16px 2px;color:var(--ink)}
.items{list-style:none;padding:8px 16px 4px;display:grid;gap:1px}
.item{display:flex;align-items:baseline;justify-content:space-between;gap:12px;padding:6px 0;border-bottom:1px solid var(--line-soft)}
.item:last-child{border-bottom:none}
.item__name{font-size:.9rem;color:var(--ink)}
.item__qty{font-size:.82rem;color:var(--ink-faint);font-variant-numeric:tabular-nums;white-space:nowrap;font-weight:500}
.chips{display:flex;flex-wrap:wrap;gap:6px;padding:6px 16px 0}
.chip{font-size:.72rem;font-weight:600;padding:3px 9px;border-radius:var(--r-pill);font-variant-numeric:tabular-nums}
.chip--p{background:var(--green-tint);color:var(--green-ink)}
.chip--c{background:oklch(0.96 0.045 80);color:var(--amber-ink)}
.chip--f{background:oklch(0.96 0.035 95);color:var(--gold-ink)}
.chip--fib{background:oklch(0.955 0.035 140);color:var(--leaf-ink)}
.tip{margin:10px 12px 12px;border-top:1px solid var(--line-soft)}
.tip>summary{list-style:none;cursor:pointer;display:flex;align-items:center;gap:7px;padding:10px 4px 2px;
  font-size:.8rem;font-weight:600;color:var(--ink-soft)}
.tip>summary::-webkit-details-marker{display:none}
.tip>summary .chev{margin-left:auto;transition:transform .2s;color:var(--ink-faint)}
.tip[open]>summary .chev{transform:rotate(180deg)}
.tip__body{font-size:.84rem;color:var(--ink-soft);line-height:1.5;padding:4px 4px 6px}
.meal--comida .swap{display:flex;gap:7px;align-items:flex-start;margin:2px 12px 12px;padding:9px 11px;
  background:var(--surface-2);border-radius:var(--r-sm);font-size:.78rem;color:var(--ink-soft)}
.meal--comida .swap b{color:var(--primary-ink)}

/* ---------- Shopping ---------- */
.view-head{padding:16px 2px 4px}
.view-head h2{font-size:1.55rem;font-weight:700;color:var(--ink)}
.view-head p{font-size:.85rem;color:var(--ink-soft);margin-top:3px}
.shop-progress{position:sticky;top:calc(env(safe-area-inset-top) + 59px);z-index:var(--z-sticky);
  background:var(--bg);padding:10px 0 12px;margin:0 -14px;border-bottom:1px solid var(--line-soft)}
.shop-progress__inner{max-width:var(--maxw);margin:0 auto;padding:0 14px;display:flex;align-items:center;gap:12px}
.shop-progress__bar{flex:1;height:9px;border-radius:var(--r-pill);background:var(--surface-2);overflow:hidden;border:1px solid var(--line-soft)}
.shop-progress__fill{height:100%;background:var(--green);width:100%;transform-origin:left;transform:scaleX(0);border-radius:var(--r-pill);transition:transform .45s cubic-bezier(.22,1,.36,1)}
.shop-progress__count{font-size:.8rem;font-weight:700;color:var(--ink);white-space:nowrap;font-variant-numeric:tabular-nums}
.shop-actions{display:flex;gap:8px;margin:13px 0 4px}
.btn{font-size:.78rem;font-weight:600;padding:8px 13px;border-radius:var(--r-pill);background:var(--surface);
  border:1px solid var(--line);color:var(--ink-soft);display:inline-flex;align-items:center;gap:6px;transition:background .15s,transform .12s}
.btn:active{transform:scale(.97)}
.btn.is-on{background:var(--primary-tint);border-color:color-mix(in oklch,var(--primary) 30%,var(--line));color:var(--primary-ink)}
.btn--ghost{margin-left:auto;background:transparent;border-color:transparent;color:var(--ink-faint)}
.cat{margin-top:20px}
.cat__title{font-size:.78rem;font-weight:700;letter-spacing:.04em;color:var(--ink-soft);text-transform:uppercase;
  padding:0 4px 8px;display:flex;align-items:center;justify-content:space-between}
.cat__title .cat__n{color:var(--ink-faint);font-weight:600}
.cat__list{background:var(--surface);border:1px solid var(--line);border-radius:var(--r-md);box-shadow:var(--shadow-sm);overflow:hidden}
.row{display:flex;align-items:center;gap:13px;padding:13px 15px;border-bottom:1px solid var(--line-soft);cursor:pointer;
  min-height:54px;transition:background .15s}
.row:last-child{border-bottom:none}
.row:active{background:var(--surface-2)}
.cbx{position:absolute;opacity:0;width:0;height:0}
.cbx-box{flex:0 0 auto;width:25px;height:25px;border-radius:8px;border:2px solid var(--line);background:var(--surface);
  display:grid;place-items:center;transition:background .18s,border-color .18s,transform .12s}
.cbx-box svg{width:15px;height:15px;stroke:#fff;stroke-width:3.2;fill:none;stroke-linecap:round;stroke-linejoin:round;
  stroke-dasharray:24;stroke-dashoffset:24;transition:stroke-dashoffset .22s ease .02s}
.row__text{flex:1;min-width:0}
.row__name{display:block;font-size:.92rem;color:var(--ink);font-weight:500;transition:color .18s}
.row__note{display:block;font-size:.74rem;color:var(--ink-faint);margin-top:2px}
.row__qty{font-size:.86rem;font-weight:700;color:var(--ink);font-variant-numeric:tabular-nums;white-space:nowrap;transition:color .18s}
.cbx:checked + .cbx-box{background:var(--green);border-color:var(--green)}
.cbx:checked + .cbx-box svg{stroke-dashoffset:0}
.cbx:checked ~ .row__text .row__name{color:var(--ink-faint);text-decoration:line-through}
.cbx:checked ~ .row__qty{color:var(--ink-faint);text-decoration:line-through}
.cbx:focus-visible + .cbx-box{outline:2.5px solid var(--primary);outline-offset:2px}
.row.is-done{background:var(--green-tint)}
body.hide-done .row.is-done{display:none}

/* ---------- Guide ---------- */
.target-card{background:var(--surface);border:1px solid var(--line);border-radius:var(--r-lg);box-shadow:var(--shadow-sm);
  padding:16px;margin:6px 0 18px}
.target-card h3{font-size:1.05rem;margin-bottom:11px;color:var(--primary-ink)}
.target-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(88px,1fr));gap:9px}
.tcell{background:var(--surface-2);border-radius:var(--r-sm);padding:10px 11px;border:1px solid var(--line-soft)}
.tcell .v{font-family:var(--ff-display);font-weight:700;font-size:1.2rem;color:var(--ink);line-height:1}
.tcell .k{font-size:.72rem;color:var(--ink-faint);margin-top:3px}
.guia-list{display:grid;gap:10px}
.gcard{background:var(--surface);border:1px solid var(--line);border-radius:var(--r-md);box-shadow:var(--shadow-sm);padding:14px 15px}
.gcard h4{font-size:.97rem;font-weight:600;font-family:var(--ff-ui);color:var(--ink);margin-bottom:4px}
.gcard p{font-size:.85rem;color:var(--ink-soft);line-height:1.5}
.disclaimer{font-size:.78rem;color:var(--ink-faint);line-height:1.5;background:var(--surface-2);border:1px solid var(--line-soft);
  border-radius:var(--r-md);padding:13px 15px;margin:18px 0 10px}
.disclaimer b{color:var(--ink-soft)}

/* ---------- Bottom nav ---------- */
.tabbar{position:fixed;left:0;right:0;bottom:0;z-index:var(--z-nav);
  height:calc(var(--tab-h) + env(safe-area-inset-bottom));padding-bottom:env(safe-area-inset-bottom);
  background:color-mix(in oklch, var(--surface) 92%, transparent);backdrop-filter:blur(12px) saturate(1.4);
  -webkit-backdrop-filter:blur(12px) saturate(1.4);border-top:1px solid var(--line);
  display:flex;justify-content:center;gap:4px}
.tab{flex:1;max-width:160px;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:3px;
  color:var(--ink-faint);font-size:.68rem;font-weight:600;letter-spacing:.01em;transition:color .15s}
.tab svg{width:23px;height:23px;fill:none;stroke:currentColor;stroke-width:1.9;stroke-linecap:round;stroke-linejoin:round}
.tab.is-on{color:var(--primary)}
.tab.is-on svg{fill:color-mix(in oklch,var(--primary) 14%,transparent)}
.tab__dot{position:absolute;top:6px;width:5px;height:5px;border-radius:50%;background:var(--primary);opacity:0;transform:scale(0);transition:.2s}
.tab.is-on .tab__dot{opacity:1;transform:scale(1)}

.toast{position:fixed;left:50%;bottom:calc(var(--tab-h) + 18px + env(safe-area-inset-bottom));transform:translateX(-50%) translateY(12px);
  z-index:var(--z-toast);background:var(--ink);color:var(--bg);font-size:.82rem;font-weight:500;padding:10px 16px;border-radius:var(--r-pill);
  box-shadow:var(--shadow-md);opacity:0;pointer-events:none;transition:opacity .25s,transform .25s}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}

@media (min-width:680px){
  :root{--maxw:660px}
  main{padding-top:4px}
  .meals{grid-template-columns:1fr 1fr}
  .meal--desayuno{grid-column:1/-1}
  .summary{position:relative}
}
@media (min-width:920px){
  :root{--maxw:980px;--tab-h:0px}
  body{padding-bottom:24px}
  .appbar__row,main,.shop-progress__inner{max-width:980px}
  .desk-nav{display:flex !important}
  .tabbar{display:none}
  .meals{grid-template-columns:1fr 1fr 1fr}
  .meal--desayuno{grid-column:auto}
  .layout-2{display:grid;grid-template-columns:300px 1fr;gap:24px;align-items:start}
  .summary{position:sticky;top:130px}
  .dayrail-wrap{top:calc(env(safe-area-inset-top) + 60px)}
  .shop-progress{top:calc(env(safe-area-inset-top) + 60px)}
}
.desk-nav{display:none;gap:4px;margin-left:auto}
.desk-nav .tab{flex:0 0 auto;flex-direction:row;gap:7px;padding:8px 15px;border-radius:var(--r-pill);font-size:.85rem;position:relative}
.desk-nav .tab.is-on{background:var(--primary-tint)}
.desk-nav .tab svg{width:18px;height:18px}
.desk-nav .tab__dot{display:none}

@media (prefers-reduced-motion:reduce){
  *{animation-duration:.001ms !important;transition-duration:.001ms !important}
}
</style>
</head>
<body>
<header class="appbar">
  <div class="appbar__row">
    <img class="brand-badge" src="icons/icon-192.png" alt="" />
    <div style="flex:1;min-width:0">
      <h1>La cocina de Daira</h1>
      <div class="sub" id="appsub">7 días · cocina mexicana nutritiva</div>
    </div>
    <nav class="desk-nav" id="deskNav" aria-label="Secciones"></nav>
  </div>
</header>

<main>
  <!-- ============ PLAN ============ -->
  <section id="view-plan" class="view is-active" aria-label="Plan del día">
    <div class="dayrail-wrap"><div class="dayrail" id="dayrail" role="group" aria-label="Elegir día de la semana"></div></div>
    <div id="summary"></div>
    <div class="meals" id="meals"></div>
  </section>

  <!-- ============ COMPRAS ============ -->
  <section id="view-compras" class="view" aria-label="Lista de super">
    <div class="view-head">
      <h2>Lista de super</h2>
      <p>Lo que necesitas para la semana completa. Ve marcando lo que ya tengas.</p>
    </div>
    <div class="shop-progress">
      <div class="shop-progress__inner">
        <div class="shop-progress__bar"><div class="shop-progress__fill" id="shopFill"></div></div>
        <span class="shop-progress__count" id="shopCount">0 / 0</span>
      </div>
    </div>
    <div class="shop-actions">
      <button class="btn" id="toggleDone" aria-pressed="false">👁️ Ocultar marcados</button>
      <button class="btn btn--ghost" id="resetShop">↺ Reiniciar</button>
    </div>
    <div id="shopList"></div>
    <div style="height:18px"></div>
  </section>

  <!-- ============ GUÍA ============ -->
  <section id="view-guia" class="view" aria-label="Guía">
    <div class="view-head"><h2>Guía y metas</h2><p>Tus números del día y los recordatorios clave.</p></div>
    <div class="target-card">
      <h3>🎯 Metas diarias</h3>
      <div class="target-grid" id="targetGrid"></div>
    </div>
    <div class="guia-list" id="guiaList"></div>
    <div class="disclaimer" id="disclaimer"></div>
  </section>
</main>

<nav class="tabbar" id="tabbar" aria-label="Navegación principal"></nav>
<div class="toast" id="toast" role="status" aria-live="polite"></div>

<script src="plan_data.js"></script>
<script>
(function(){
  "use strict";
  var D = window.PLAN_DATA;
  var $ = function(s,el){return (el||document).querySelector(s)};
  if(!D){document.body.innerHTML='<p style="padding:40px;text-align:center;color:#933">No se pudo cargar el plan (plan_data.js). Vuelve a abrir la app.</p>';return;}

  var T = D.meta.metas;
  var DROP='<svg viewBox="0 0 24 24"><path d="M12 2.5C12 2.5 5 10 5 15a7 7 0 0 0 14 0c0-5-7-12.5-7-12.5z"/></svg>';
  var CHECK='<svg viewBox="0 0 24 24"><polyline points="4 12.5 9.5 18 20 6.5"/></svg>';
  var ICONS={
    plan:'<svg viewBox="0 0 24 24"><rect x="3" y="4" width="18" height="17" rx="2.5"/><path d="M3 9h18M8 2.5v3M16 2.5v3"/></svg>',
    compras:'<svg viewBox="0 0 24 24"><path d="M5 7h15l-1.3 9.2a2 2 0 0 1-2 1.8H8.3a2 2 0 0 1-2-1.8L5 7zM5 7 4 3H2"/><circle cx="9" cy="21" r="1"/><circle cx="17" cy="21" r="1"/></svg>',
    guia:'<svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="9.5"/><path d="M12 11v5M12 7.5h.01"/></svg>'
  };
  var TABS=[{id:'plan',label:'Plan'},{id:'compras',label:'Compras'},{id:'guia',label:'Guía'}];

  /* ---------- estado ---------- */
  var KEY='daira.state.v1';
  var state={day:0,tab:'plan',checked:{},water:{}};
  try{var s=JSON.parse(localStorage.getItem(KEY));if(s)state=Object.assign(state,s);}catch(e){}
  var todayIdx=( (new Date().getDay())+6)%7;
  if(state._firstday===undefined){state.day=todayIdx;state._firstday=true;}
  if(typeof state.day!=='number'||state.day<0||state.day>=D.dias.length)state.day=todayIdx;
  if(!TABS.some(function(t){return t.id===state.tab;}))state.tab='plan';
  function save(){try{localStorage.setItem(KEY,JSON.stringify(state));}catch(e){}}

  /* ---------- helpers ---------- */
  function pct(v,t){return Math.max(0,Math.min(100,Math.round(v/t*100)));}
  function el(tag,cls,html){var e=document.createElement(tag);if(cls)e.className=cls;if(html!=null)e.innerHTML=html;return e;}
  var toastT;
  function toast(msg){var t=$('#toast');t.textContent=msg;t.classList.add('show');clearTimeout(toastT);toastT=setTimeout(function(){t.classList.remove('show');},1800);}

  /* ---------- day rail ---------- */
  var ABBR=['Lun','Mar','Mié','Jue','Vie','Sáb','Dom'];
  var dayBtns=[];
  function buildRail(){
    var r=$('#dayrail');r.innerHTML='';dayBtns=[];
    D.dias.forEach(function(d,i){
      var b=el('button','day'+(i===state.day?' is-on':'')+(i===todayIdx?' is-today':''));
      b.type='button';
      b.setAttribute('aria-pressed',i===state.day?'true':'false');
      b.setAttribute('tabindex',i===state.day?'0':'-1');
      b.setAttribute('aria-label',d.nombre+(i===todayIdx?' (hoy)':''));
      b.innerHTML='<div class="dn">'+ABBR[i]+'</div><div class="di">'+d.nombre.charAt(0)+'</div>';
      b.onclick=function(){setDay(i);};
      b.onkeydown=function(e){
        var n=null,L=D.dias.length;
        if(e.key==='ArrowRight'||e.key==='ArrowDown')n=(i+1)%L;
        else if(e.key==='ArrowLeft'||e.key==='ArrowUp')n=(i-1+L)%L;
        else if(e.key==='Home')n=0; else if(e.key==='End')n=L-1;
        if(n!==null){e.preventDefault();setDay(n,true);}
      };
      dayBtns.push(b);r.appendChild(b);
    });
    var on=dayBtns[state.day];if(on&&on.scrollIntoView)on.scrollIntoView({inline:'center',block:'nearest'});
  }
  function setDay(i,focus){
    state.day=i;save();
    dayBtns.forEach(function(b,idx){
      var on=idx===i;
      b.classList.toggle('is-on',on);
      b.setAttribute('aria-pressed',on?'true':'false');
      b.setAttribute('tabindex',on?'0':'-1');
    });
    var cur=dayBtns[i];
    if(cur&&cur.scrollIntoView)cur.scrollIntoView({inline:'center',block:'nearest'});
    if(focus&&cur)cur.focus();
    renderDay();
  }

  /* ---------- summary + meals ---------- */
  var SLOT_ICON={Desayuno:'🌅',Comida:'🍽️',Cena:'🌙',Snacks:'🍓'};
  var SLOT_LABEL={Desayuno:'Desayuno',Comida:'Comida',Cena:'Cena',Snacks:'Snacks y antojo'};
  function renderDay(){
    var d=D.dias[state.day],t=d.totales;
    // summary
    var sm=el('div','summary');
    sm.innerHTML=
      '<div class="summary__top"><div class="kcal-big">'+t.kcal+' <small>kcal</small></div>'+
      '<div class="kcal-meta">meta ~'+T.kcal+' kcal<br>proteína <b>'+t.p+' g</b></div></div>'+
      '<div class="bars">'+
        barRow('Proteína','b-p',t.p,T.p,'g')+
        barRow('Carbos','b-c',t.c,T.c,'g')+
        barRow('Grasa','b-f',t.f,T.f,'g')+
        barRow('Fibra','b-fib',t.fib,T.fib,'g')+
      '</div>'+
      '<div class="habits"><div class="water"><span class="water__label">'+DROP+' Agua</span><div class="drops" id="drops"></div></div>'+
      '<span class="steps-chip">👟 meta '+ (T.steps/1000) +'k pasos</span></div>';
    var host=$('#summary');host.innerHTML='';host.appendChild(sm);
    // animate bars after paint
    requestAnimationFrame(function(){requestAnimationFrame(function(){
      [['p',T.p],['c',T.c],['f',T.f],['fib',T.fib]].forEach(function(x,idx){
        var f=sm.querySelectorAll('.bar__fill')[idx];if(f)f.style.transform='scaleX('+(pct(t[x[0]],x[1])/100)+')';
      });
    });});
    buildDrops();
    // meals
    var m=$('#meals');m.innerHTML='';
    d.comidas.forEach(function(meal,idx){
      m.appendChild(mealCard(meal,idx));
    });
  }
  function barRow(lab,cls,v,t,u){
    return '<div class="bar '+cls+'"><span class="bar__lab">'+lab+'</span>'+
      '<span class="bar__track"><span class="bar__fill"></span></span>'+
      '<span class="bar__val"><b>'+v+'</b>/'+t+u+'</span></div>';
  }
  function mealCard(meal,idx){
    var slot=meal.slot;
    var c=el('article','meal meal--'+slot.toLowerCase());c.style.setProperty('--i',idx);
    var items=meal.items.map(function(it){
      return '<li class="item"><span class="item__name">'+it.nombre+'</span><span class="item__qty">'+it.cantidad+'</span></li>';
    }).join('');
    var tt=meal.totales;
    var chips='<div class="chips">'+
      '<span class="chip chip--p">P '+tt.p+'</span>'+
      '<span class="chip chip--c">C '+tt.c+'</span>'+
      '<span class="chip chip--f">G '+tt.f+'</span>'+
      (tt.fib?'<span class="chip chip--fib">Fibra '+tt.fib+'</span>':'')+'</div>';
    var swap = slot==='Comida'
      ? '<div class="swap">🍴 <div>Si comes fuera con tu novio, cambia esta comida por la opción de <b>“comer fuera”</b> (ver Guía): tacos de maíz, pozole, fajitas o algo a la plancha.</div></div>'
      : '';
    c.innerHTML=
      '<div class="meal__head"><span class="meal__slot">'+(SLOT_ICON[slot]||'')+' '+(SLOT_LABEL[slot]||slot)+'</span>'+
        '<span class="meal__kcal">'+meal.totales.kcal+' <span>kcal</span></span></div>'+
      '<h3 class="meal__title">'+meal.titulo+'</h3>'+
      '<ul class="items">'+items+'</ul>'+chips+swap+
      '<details class="tip"><summary>💡 Tip <span class="chev">⌄</span></summary><p class="tip__body">'+meal.tip+'</p></details>';
    return c;
  }

  /* ---------- water ---------- */
  function buildDrops(){
    var host=$('#drops');if(!host)return;host.innerHTML='';
    var n=8,have=state.water[state.day]||0;
    for(var i=0;i<n;i++){(function(i){
      var b=el('button','drop'+(i<have?' on':''));b.innerHTML=DROP;
      b.setAttribute('aria-label','Vaso '+(i+1)+' de '+n);
      b.onclick=function(){
        var cur=state.water[state.day]||0;
        state.water[state.day]=(cur===i+1)?i:i+1;
        save();buildDrops();
        if(state.water[state.day]>=n)toast('¡8 vasos! 💧 Vas increíble');
      };
      host.appendChild(b);
    })(i);}
  }

  /* ---------- shopping ---------- */
  function shopId(cat,nombre){return cat+'::'+nombre;}
  function totalItems(){var n=0;D.compras.forEach(function(c){n+=c.items.length;});return n;}
  function checkedCount(){var n=0;D.compras.forEach(function(c){c.items.forEach(function(it){if(state.checked[shopId(c.categoria,it.nombre)])n++;});});return n;}
  function renderShop(){
    var host=$('#shopList');host.innerHTML='';
    D.compras.forEach(function(cat){
      var done=cat.items.filter(function(it){return state.checked[shopId(cat.categoria,it.nombre)];}).length;
      var sec=el('section','cat');
      sec.appendChild(el('div','cat__title','<span>'+cat.categoria+'</span><span class="cat__n">'+done+'/'+cat.items.length+'</span>'));
      var list=el('div','cat__list');
      cat.items.forEach(function(it){
        var id=shopId(cat.categoria,it.nombre),on=!!state.checked[id];
        var row=el('label','row'+(on?' is-done':''));
        row.innerHTML='<input type="checkbox" class="cbx" '+(on?'checked':'')+'>'+
          '<span class="cbx-box">'+CHECK+'</span>'+
          '<span class="row__text"><span class="row__name">'+it.nombre+'</span>'+
          (it.nota?'<span class="row__note">'+it.nota+'</span>':'')+'</span>'+
          '<span class="row__qty">'+it.comprar+'</span>';
        var input=row.querySelector('.cbx');
        input.onchange=function(){
          if(input.checked)state.checked[id]=1;else delete state.checked[id];
          row.classList.toggle('is-done',input.checked);
          save();updateShopProgress();
          // update category count
          var dn=cat.items.filter(function(x){return state.checked[shopId(cat.categoria,x.nombre)];}).length;
          sec.querySelector('.cat__n').textContent=dn+'/'+cat.items.length;
        };
        list.appendChild(row);
      });
      sec.appendChild(list);
      host.appendChild(sec);
    });
    updateShopProgress();
  }
  function updateShopProgress(){
    var tot=totalItems(),dn=checkedCount();
    $('#shopFill').style.transform='scaleX('+(tot?dn/tot:0)+')';
    $('#shopCount').textContent=dn+' / '+tot;
  }

  /* ---------- guide ---------- */
  function renderGuide(){
    var g=$('#targetGrid');
    var cells=[['~'+T.kcal,'kcal'],[T.p+' g','Proteína'],[T.c+' g','Carbos'],[T.f+' g','Grasa'],[T.fib+' g','Fibra'],[T.water_l+' L','Agua'],[(T.steps/1000)+'k','Pasos']];
    g.innerHTML=cells.map(function(c){return '<div class="tcell"><div class="v">'+c[0]+'</div><div class="k">'+c[1]+'</div></div>';}).join('');
    $('#guiaList').innerHTML=D.guia.map(function(x){return '<div class="gcard"><h4>'+x.t+'</h4><p>'+x.d+'</p></div>';}).join('');
    $('#disclaimer').innerHTML='<b>Nota:</b> '+D.meta.nota+' Este plan es una guía y no sustituye a un médico o nutriólogo; valídalo con un profesional, sobre todo por tus triglicéridos, la isotretinoína y la gastritis/colitis.';
  }

  /* ---------- nav ---------- */
  function buildTabs(){
    var bar=$('#tabbar'),desk=$('#deskNav');bar.innerHTML='';desk.innerHTML='';
    TABS.forEach(function(tb){
      [bar,desk].forEach(function(container){
        var b=el('button','tab'+(state.tab===tb.id?' is-on':''));
        b.innerHTML='<span class="tab__dot"></span>'+ICONS[tb.id]+'<span>'+tb.label+'</span>';
        b.setAttribute('aria-label',tb.label);b.setAttribute('aria-current',state.tab===tb.id?'page':'false');
        b.onclick=function(){setTab(tb.id);};
        container.appendChild(b);
      });
    });
  }
  function setTab(id){
    var v=$('#view-'+id);
    if(!v){id='plan';v=$('#view-plan');}
    state.tab=id;save();
    document.querySelectorAll('.view').forEach(function(x){x.classList.remove('is-active');});
    v.classList.add('is-active');
    buildTabs();
    window.scrollTo(0,0);
    if(id==='compras')renderShop();
  }

  /* ---------- shop actions ---------- */
  $('#toggleDone').onclick=function(){
    var on=document.body.classList.toggle('hide-done');
    this.classList.toggle('is-on',on);this.setAttribute('aria-pressed',on);
    this.innerHTML=(on?'👁️ Mostrar marcados':'👁️ Ocultar marcados');
  };
  $('#resetShop').onclick=function(){
    if(checkedCount()===0){toast('La lista ya está vacía');return;}
    if(confirm('¿Desmarcar todos los productos de la lista?')){
      state.checked={};save();renderShop();toast('Lista reiniciada');
    }
  };

  /* ---------- init ---------- */
  $('#appsub').textContent=D.meta.subtitulo||'';
  buildTabs();buildRail();renderDay();renderGuide();
  setTab(state.tab);

  /* ---------- service worker ---------- */
  if('serviceWorker' in navigator && location.protocol.indexOf('http')===0){
    window.addEventListener('load',function(){
      navigator.serviceWorker.register('service-worker.js').catch(function(){});
    });
  }
})();
</script>
</body>
</html>
